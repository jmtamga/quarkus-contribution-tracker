<div class="app-side-menu">
  @for (item of menuItems; track $index; ) {
  <mat-nav-list>
    <a
      mat-list-item
      [routerLink]="[`/${item.path}`]"
      [routerLinkActive]="['is-active']"
      class="app-mat-list-item-link"
      [title]="[`${item.title}`]"
    >
      <span class="entry">
        <mat-icon>{{ item.icon }}</mat-icon>
        @if(!isCollapsed) {
        <span>{{ item.label }}</span>
        }
      </span>
    </a>
  </mat-nav-list>
  }
</div>
